set -g mouse on

# Hide the status bar so tmux is invisible — Ghostty tabs look native
set -g status off

# Remove the 500ms delay after pressing Escape — makes Escape feel instant
# (without this, Claude Code and any vim-like UI feels sluggish)
set -sg escape-time 0

# Pass focus events through so apps know when the window gains/loses focus
set -g focus-events on

# True color support — without this Claude Code's UI renders with wrong colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Large scrollback buffer — lets you scroll up through long Claude responses
set -g history-limit 50000

# Scroll 1 line per touchpad tick instead of the default 3 (smoother)
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# Hide the yellow copy-mode position indicator in the top-right corner
set -g mode-style "bg=default,fg=default"

# ---------------------------------------------------------------------------
# Ghostty keybindings
# Ghostty sends Ctrl+B (tmux prefix) + a key via its `text:` action.
# Tmux intercepts the prefix before any foreground process (e.g. Claude Code)
# sees it, so these work even when Claude is running.
#   Cmd+W        → prefix + q  → kill current session (closes the Ghostty tab)
#   Cmd+S        → prefix + s  → save session layout via tmux-resurrect
#   Cmd+Shift+T  → prefix + r  → restore saved layout via tmux-resurrect
# ---------------------------------------------------------------------------
bind-key q kill-session
bind-key s run-shell -b "~/.tmux/plugins/tmux-resurrect/scripts/save.sh"
bind-key r run-shell -b "~/.tmux/plugins/tmux-resurrect/scripts/restore.sh"

# ---------------------------------------------------------------------------
# Plugins (managed by TPM)
# On a fresh machine, TPM bootstraps itself — see the block below.
# After that, plugins install automatically on first tmux start.
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save every 15 min; auto-restore on tmux server start (e.g. after reboot)
set -g @continuum-restore 'on'

# Bootstrap TPM if not present, then install all plugins
if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/tpm'"

run '~/.tmux/plugins/tpm/tpm'
