set -g mouse on

# Remove the 500ms delay after pressing Escape — makes Escape feel instant
# (without this, Claude Code and any vim-like UI feels sluggish)
set -sg escape-time 0

# Pass focus events through so apps know when the window gains/loses focus
set -g focus-events on

# True color support — without this Claude Code's UI renders with wrong colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Extended key support — passes Shift+Enter and other modified keys through to apps
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Set window title to the current directory name
set -g set-titles on
set -g set-titles-string "#{b:pane_current_path}"

# Large scrollback buffer
set -g history-limit 50000

# Scroll 1 line per touchpad tick instead of the default 3 (smoother)
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# Neutral selection highlight (grey instead of yellow) — still visible but not jarring
set -g mode-style "bg=colour238,fg=colour255"
